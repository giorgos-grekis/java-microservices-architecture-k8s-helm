management:
  endpoints:
    web:
      exposure:
        include: "*" # enable and expose all management endpoint supported by the spring boot actuator


spring:
  application:
    name: configserver
  rabbitmq:
    host: "localhost"
    port: 5672 # or 15672
    username: "guest"
    password: "guest"

  profiles:
    active: git # or "native" # διαβάζει τοπικά αρχεία (Native Profile)
  cloud:
    config:
      server:
        git:
          uri: "https://github.com/giorgos-grekis/java-microservices-architecture-k8s-helm-config.git"
          default-label: "main"
          timeout: 5 # wait for 5 seconds
          clone-on-start: true
          force-pull: true # overwrite all local changes
        #        native:
          # search-locations: "classpath:/config"
          # Reading configurations from a file system location
#          search-locations: "file:///home/***/**/configserver/src/main/resources/config/"

