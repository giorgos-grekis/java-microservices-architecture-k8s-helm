server:
  port: 8080

spring:
  application:
    name: accounts # same name with configserver resources
  datasource:
      url: jdbc:postgresql://localhost:5432/accountsdb
      username: 'postgres'
      password: 'root'
  ## TODO: enable this after development
  sql:
    init:
      mode: always

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update # create the tables automatically
    show-sql: true # show the sql queries


  profiles:
    active: "prod" # ["", "qa", "prod"]
  config:
    import: "optional:configserver:http://localhost:8071"
  rabbitmq:
    host: "localhost"
    port: 5672 # or 15672
    username: "guest"
    password: "guest"

management:
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "*" # enable and expose all management endpoint supported by the spring boot actuator
  endpoint:
    shutdown:
      enabled: true # shutdown the account ms
    info:
      env:
        enabled: true # enabled env related information
    health:
      probes:
        enabled: true

#endpoints:
#  shutdown:
#    enabled: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetchRegistry: true # accounts ms will try to fetch the registry details whenever it's trying to connect with other microservices.
    registerWithEureka: true # accounts ms will be registered with the Eureka server.
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/

info:
  app:
    name: "accounts"
    description: "Accounts Application"
    version: "1.0.0"