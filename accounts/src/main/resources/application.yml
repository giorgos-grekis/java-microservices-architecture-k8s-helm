server:
  port: 8080

spring:
  application:
    name: accounts
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update # create the tables automatically
    show-sql: true # show the sql queries

build:
  version: "1.0"

accounts:
  message: "Welcome to accounts ms"
  contactDetails:
    name: "John Doe"
    email: "john@test.com"
  onCallSupport:
    - (000) 666-4269
    - (111) 999-6942
