services:
  rabbit:
    image: rabbitmq:4-management
    hostname: rabbitmq
    ports:
      - "5672:5672" # core activities of the Rabbitmq (AMQP protocol for apps)
      - "15672:15672" # management of the Rabbitmq (Web UI interface)
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
#    networks:
#      - cisu2network
    extends:
      file: common-config.yml # file name
      service: network-deploy-service # service to import from the file

# Accounts database
  accountsdb:
    image: postgres:18.3-alpine3.23
#    container_name: accountsdb
    ports:
      - 5432:5432
#    healthcheck:
#      test: [ "CMD", "pg_isready", "-U", "postgres", "-d", "accountsdb" ]
#      interval: 10s
#      timeout: 5s
#      retries: 5
#      start_period: 10s
    environment:
#      POSTGRES_PASSWORD: "root"
      POSTGRES_DB: "accountsdb"
    extends:
      file: common-config.yml # file name
      service: microservice-db-config # service to import from the file contain also network-deploy-service

# Loans Database
  loansdb:
#    image: postgres:18.3-alpine3.23
    container_name: loansdb
    ports:
      - 5433:5432
#    healthcheck:
#      test: [ "CMD", "pg_isready", "-U", "postgres", "-d", "loansdb" ]
#      interval: 10s
#      timeout: 5s
#      retries: 5
#      start_period: 10s
    environment:
#      POSTGRES_PASSWORD: "root"
      POSTGRES_DB: "loansdb"
    extends:
      file: common-config.yml # file name
      service: microservice-db-config # service to import from the file

# Cards Database
  cardsdb:
#    image: postgres:18.3-alpine3.23
    container_name: cardsdb
    ports:
      - 5434:5432
#    healthcheck:
#      test: [ "CMD", "pg_isready", "-U", "postgres", "-d", "cardsdb" ]
#      interval: 10s
#      timeout: 5s
#      retries: 5
#      start_period: 10s
    environment:
#      POSTGRES_PASSWORD: "root"
      POSTGRES_DB: "cardsdb"
    extends:
      file: common-config.yml # file name
      service: microservice-db-config # service to import from the file

  configserver:
    image: "cisu2/configserver:004"
    container_name: configserver-ms
    ports:
      - "8071:8071"
    depends_on:
      rabbit:
        condition: service_healthy
#    healthcheck:
#      test: "curl --fail --silent localhost:8071/actuator/health/readiness | grep UP || exit 1"
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://localhost:8071/actuator/health/readiness || exit 1"
      interval: 10s # 3. run test command every  10 sec
      timeout: 5s # 4. fail the test if takes more than 5 sec
      retries: 10 # 2. if there is a failure try again for 10 times
      start_period: 5s # 1. start the test after 5 sec
#    deploy:
#      resources:
#        limits:
#          memory: 700m # max 700mb memory
#    networks:
#      - cisu2network
    extends:
      file: common-config.yml # file name
      service: microservice-base-config # service to import from the file


  eurekaserver:
    image: "cisu2/eurekaserver:004"
    container_name: eurekaserver-ms
    ports:
      - "8070:8070"
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://localhost:8070/actuator/health/readiness || exit 1"
      interval: 10s # 3. run test command every  10 sec
      timeout: 5s # 4. fail the test if takes more than 5 sec
      retries: 10 # 2. if there is a failure try again for 10 times
      start_period: 5s # 1. start the test after 5 sec
    extends:
      file: common-config.yml # file name
      service: microservice-configserver-config # service to import from the file
    environment:
      SPRING_APPLICATION_NAME: "eurekaserver" # same name as application.yml from eurekaserver


  accounts:
    image: "cisu2/account:004"
    container_name: accounts-ms
    ports:
      - "8080:8080"
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health/readiness || exit 1"
      interval: 10s # 3. run test command every  10 sec
      timeout: 5s # 4. fail the test if takes more than 5 sec
      retries: 10 # 2. if there is a failure try again for 10 times
      start_period: 5s # 1. start the test after 5 sec
    depends_on:
      configserver:
        condition: service_healthy # service_completed_successfully
      accountsdb:
        condition: service_healthy
#    deploy:
#      resources:
#        limits:
#          memory: 700m # max 700mb memory
#    networks:
#      - cisu2network
    environment:
#      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8071/"
#      SPRING_PROFILES_ACTIVE: "default"
      SPRING_APPLICATION_NAME: "accounts"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://accountsdb:5432/accountsdb"

    extends:
      file: common-config.yml # file name
      service: microservice-eureka-config # service to import from the file

  loans:
    image: "cisu2/loans:004"
    container_name: loans-ms
    ports:
      - "8090:8090"
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://localhost:8090/actuator/health/readiness || exit 1"
      interval: 10s # 3. run test command every  10 sec
      timeout: 5s # 4. fail the test if takes more than 5 sec
      retries: 10 # 2. if there is a failure try again for 10 times
      start_period: 5s # 1. start the test after 5 sec
    depends_on:
      configserver:
        condition: service_healthy # service_completed_successfully
      loansdb:
        condition: service_healthy
#    deploy:
#      resources:
#        limits:
#          memory: 700m
#    networks:
#      - cisu2network # tag all ms under the same network
    environment:
#      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8071/"
#      SPRING_PROFILES_ACTIVE: "default"
      SPRING_APPLICATION_NAME: "loans"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://loansdb:5432/loansdb"
    extends:
      file: common-config.yml # file name
      service: microservice-eureka-config # service to import from the file

  cards:
    image: "cisu2/cards:004"
    container_name: cards-ms
    ports:
      - "9000:9000"
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://localhost:9000/actuator/health/readiness || exit 1"
      interval: 10s # 3. run test command every  10 sec
      timeout: 5s # 4. fail the test if takes more than 5 sec
      retries: 10 # 2. if there is a failure try again for 10 times
      start_period: 5s # 1. start the test after 5 sec
    depends_on:
      configserver:
        condition: service_healthy # service_completed_successfully
      cardsdb:
        condition: service_healthy
#    deploy:
#      resources:
#        limits:
#          memory: 700m
#    networks:
#      - cisu2network
    environment:
#      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8071/"
#      SPRING_PROFILES_ACTIVE: "default"
      SPRING_APPLICATION_NAME: "cards"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://cardsdb:5432/cardsdb"
    extends:
      file: common-config.yml # file name
      service: microservice-eureka-config # service to import from the file


  gatewayserver:
    image: "cisu2/gatewayserver:004"
    container_name: gatewayserver-ms
    ports:
      - "8072:8072"
    depends_on:
      accounts:
        condition: service_healthy # service_completed_successfully
      loans:
        condition: service_healthy # service_completed_successfully
      cards:
        condition: service_healthy # service_completed_successfully
    environment:
      SPRING_APPLICATION_NAME: "gatewayserver"
    extends:
      file: common-config.yml # file name
      service: microservice-eureka-config # service to import from the file

# create a network with the name of "cisu2network" and drive of "bridge"
networks:
  cisu2network:
    driver: "bridge"
