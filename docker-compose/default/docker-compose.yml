services:

  ### keycloak - 0auth services
  keycloak:
    image: quay.io/keycloak/keycloak:26.4.7
    container_name: keycloak
    ports:
      - "127.0.0.1:7080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "admin"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "admin"
    command: "start-dev"
    extends:
      file: common-config.yml
      service: network-deploy-service

  ##### grafana
  read:
    image: grafana/loki:3.6.2
    command: "-config.file=/etc/loki/config.yaml -target=read"
    ports:
      - 3101:3100
      - 7946
      - 9095
    volumes:
      - ../observability/loki/loki-config.yaml:/etc/loki/config.yaml
    depends_on:
      - minio
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: &loki-dns
      cisu2network:
        aliases:
          - loki

  write:
    image: grafana/loki:3.6.2
    command: "-config.file=/etc/loki/config.yaml -target=write"
    ports:
      - 3102:3100
      - 7946
      - 9095
    volumes:
      - ../observability/loki/loki-config.yaml:/etc/loki/config.yaml
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - minio
    networks:
      <<: *loki-dns

  alloy:
    image: grafana/alloy:v1.12.0
    volumes:
      - ../observability/alloy/alloy-local-config.yaml:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    ports:
      - 12345:12345
    depends_on:
      - gateway
    extends:
      file: common-config.yml
      service: network-deploy-service

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /data/loki-data && \
        mkdir -p /data/loki-ruler && \
        minio server /data
    environment:
      - MINIO_ROOT_USER=loki
      - MINIO_ROOT_PASSWORD=supersecret
      - MINIO_PROMETHEUS_AUTH_TYPE=public
      - MINIO_UPDATE=off
    ports:
      - 9000
    volumes:
      - ./.data/minio:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 15s
      timeout: 20s
      retries: 5
    extends:
      file: common-config.yml
      service: network-deploy-service

  prometheus:
    image: prom/prometheus:v3.8.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    extends:
      file: common-config.yml
      service: network-deploy-service

  tempo:
    image: grafana/tempo:2.9.0
    container_name: tempo
    command: -config.file /etc/tempo-config.yml
    ports:
      - "3110:3100"
      - "4318:4318"
    volumes:
      - ../observability/tempo/tempo.yml:/etc/tempo-config.yml
    extends:
      file: common-config.yml
      service: network-deploy-service

  grafana:
    image: grafana/grafana:12.3.0
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - gateway
    entrypoint:
      - sh
      - -euc
      - |
        /run.sh
    ports:
      - "3000:3000"
    volumes:
      - ../observability/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    extends:
      file: common-config.yml
      service: network-deploy-service

  backend:
    image: grafana/loki:3.6.2
    volumes:
      - ../observability/loki/loki-config.yaml:/etc/loki/config.yaml
    ports:
      - "3100"
      - "7946"
    command: "-config.file=/etc/loki/config.yaml -target=backend -legacy-read-mode=false"
    depends_on:
      - gateway
    extends:
      file: common-config.yml
      service: network-deploy-service

  gateway:
    image: nginx:1.29.3
    depends_on:
      - read
      - write
    entrypoint:
      - sh
      - -euc
      - |
        cat <<EOF > /etc/nginx/nginx.conf
        user  nginx;
        worker_processes  5;  ## Default: 1

        events {
          worker_connections   1000;
        }

        http {
          resolver 127.0.0.11;

          server {
            listen             3100;

            location = / {
              return 200 'OK';
              auth_basic off;
            }

            location = /api/prom/push {
              proxy_pass       http://write:3100\$$request_uri;
            }

            location = /api/prom/tail {
              proxy_pass       http://read:3100\$$request_uri;
              proxy_set_header Upgrade \$$http_upgrade;
              proxy_set_header Connection "upgrade";
            }

            location ~ /api/prom/.* {
              proxy_pass       http://read:3100\$$request_uri;
            }

            location = /loki/api/v1/push {
              proxy_pass       http://write:3100\$$request_uri;
            }

            location = /loki/api/v1/tail {
              proxy_pass       http://read:3100\$$request_uri;
              proxy_set_header Upgrade \$$http_upgrade;
              proxy_set_header Connection "upgrade";
            }

            location ~ /loki/api/.* {
              proxy_pass       http://read:3100\$$request_uri;
            }
          }
        }
        EOF
        /docker-entrypoint.sh nginx -g "daemon off;"
    ports:
      - "3100:3100"
    healthcheck:
      test: [ "CMD", "service", "nginx", "status" ]
      interval: 10s
      timeout: 5s
      retries: 5
    extends:
      file: common-config.yml
      service: network-deploy-service


  #### grafana


  # redis
  redis:
    image: redis:8.6.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      timeout: 10s
      retries: 10
    extends:
      file: common-config.yml
      service: network-deploy-service

  # rabbitmq
  rabbit:
    image: rabbitmq:4-management
    hostname: rabbitmq
    ports:
      - "5672:5672" # core activities of the Rabbitmq (AMQP protocol for apps)
      - "15672:15672" # management of the Rabbitmq (Web UI interface)
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
#    networks:
#      - cisu2network
    extends:
      file: common-config.yml # file name
      service: network-deploy-service # service to import from the file

# Accounts database
  accountsdb:
    image: postgres:18.3-alpine3.23
#    container_name: accountsdb
    ports:
      - 5432:5432
#    healthcheck:
#      test: [ "CMD", "pg_isready", "-U", "postgres", "-d", "accountsdb" ]
#      interval: 10s
#      timeout: 5s
#      retries: 5
#      start_period: 10s
    environment:
#      POSTGRES_PASSWORD: "root"
      POSTGRES_DB: "accountsdb"
    extends:
      file: common-config.yml # file name
      service: microservice-db-config # service to import from the file contain also network-deploy-service

# Loans Database
  loansdb:
#    image: postgres:18.3-alpine3.23
    container_name: loansdb
    ports:
      - 5433:5432
#    healthcheck:
#      test: [ "CMD", "pg_isready", "-U", "postgres", "-d", "loansdb" ]
#      interval: 10s
#      timeout: 5s
#      retries: 5
#      start_period: 10s
    environment:
#      POSTGRES_PASSWORD: "root"
      POSTGRES_DB: "loansdb"
    extends:
      file: common-config.yml # file name
      service: microservice-db-config # service to import from the file

# Cards Database
  cardsdb:
#    image: postgres:18.3-alpine3.23
    container_name: cardsdb
    ports:
      - 5434:5432
#    healthcheck:
#      test: [ "CMD", "pg_isready", "-U", "postgres", "-d", "cardsdb" ]
#      interval: 10s
#      timeout: 5s
#      retries: 5
#      start_period: 10s
    environment:
#      POSTGRES_PASSWORD: "root"
      POSTGRES_DB: "cardsdb"
    extends:
      file: common-config.yml # file name
      service: microservice-db-config # service to import from the file

  configserver:
    image: "cisu2/configserver:004"
    container_name: configserver-ms
    ports:
      - "8071:8071"
    depends_on:
      rabbit:
        condition: service_healthy
#    healthcheck:
#      test: "curl --fail --silent localhost:8071/actuator/health/readiness | grep UP || exit 1"
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://localhost:8071/actuator/health/readiness || exit 1"
      interval: 20s # 3. run test command every  10 sec
      timeout: 5s # 4. fail the test if takes more than 5 sec
      retries: 20 # 2. if there is a failure try again for 10 times
      start_period: 5s # 1. start the test after 5 sec
#    deploy:
#      resources:
#        limits:
#          memory: 700m # max 700mb memory
#    networks:
#      - cisu2network
    extends:
      file: common-config.yml # file name
      service: microservice-base-config # service to import from the file
    environment:
      OTEL_SERVICE_NAME: "configserver"


  eurekaserver:
    image: "cisu2/eurekaserver:004"
    container_name: eurekaserver-ms
    ports:
      - "8070:8070"
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://localhost:8070/actuator/health/readiness || exit 1"
      interval: 20s # 3. run test command every  10 sec
      timeout: 5s # 4. fail the test if takes more than 5 sec
      retries: 20 # 2. if there is a failure try again for 10 times
      start_period: 5s # 1. start the test after 5 sec
    extends:
      file: common-config.yml # file name
      service: microservice-configserver-config # service to import from the file
    environment:
      SPRING_APPLICATION_NAME: "eurekaserver" # same name as application.yml from eurekaserver
      OTEL_SERVICE_NAME: "eurekaserver"

  accounts:
    image: "cisu2/account:004"
    container_name: accounts-ms
    #    not going to exposed this service to outside world
#    ports:
#      - "8080:8080"
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health/readiness || exit 1"
      interval: 20s # 3. run test command every  10 sec
      timeout: 5s # 4. fail the test if takes more than 5 sec
      retries: 20 # 2. if there is a failure try again for 10 times
      start_period: 5s # 1. start the test after 5 sec
    depends_on:
      configserver:
        condition: service_healthy # service_completed_successfully
      accountsdb:
        condition: service_healthy
#    deploy:
#      resources:
#        limits:
#          memory: 700m # max 700mb memory
#    networks:
#      - cisu2network
    environment:
#      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8071/"
#      SPRING_PROFILES_ACTIVE: "default"
      SPRING_APPLICATION_NAME: "accounts"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://accountsdb:5432/accountsdb"
      OTEL_SERVICE_NAME: "accounts"

    extends:
      file: common-config.yml # file name
      service: microservice-eureka-config # service to import from the file

  loans:
    image: "cisu2/loans:004"
    container_name: loans-ms
    #    not going to exposed this service to outside world
#    ports:
#      - "8090:8090"
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://localhost:8090/actuator/health/readiness || exit 1"
      interval: 20s # 3. run test command every  10 sec
      timeout: 5s # 4. fail the test if takes more than 5 sec
      retries: 20 # 2. if there is a failure try again for 10 times
      start_period: 5s # 1. start the test after 5 sec
    depends_on:
      configserver:
        condition: service_healthy # service_completed_successfully
      loansdb:
        condition: service_healthy
#    deploy:
#      resources:
#        limits:
#          memory: 700m
#    networks:
#      - cisu2network # tag all ms under the same network
    extends:
      file: common-config.yml # file name
      service: microservice-eureka-config # service to import from the file
    environment:
      #      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8071/"
      #      SPRING_PROFILES_ACTIVE: "default"
      SPRING_APPLICATION_NAME: "loans"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://loansdb:5432/loansdb"
      OTEL_SERVICE_NAME: "loans"

  cards:
    image: "cisu2/cards:004"
    container_name: cards-ms
    #    not going to exposed this service to outside world
#    ports:
#      - "9000:9000"
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://localhost:9000/actuator/health/readiness || exit 1"
      interval: 20s # 3. run test command every  10 sec
      timeout: 5s # 4. fail the test if takes more than 5 sec
      retries: 20 # 2. if there is a failure try again for 10 times
      start_period: 5s # 1. start the test after 5 sec
    depends_on:
      configserver:
        condition: service_healthy # service_completed_successfully
      cardsdb:
        condition: service_healthy
#    deploy:
#      resources:
#        limits:
#          memory: 700m
#    networks:
#      - cisu2network
    extends:
      file: common-config.yml # file name
      service: microservice-eureka-config # service to import from the file
    environment:
      #      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8071/"
      #      SPRING_PROFILES_ACTIVE: "default"
      SPRING_APPLICATION_NAME: "cards"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://cardsdb:5432/cardsdb"
      OTEL_SERVICE_NAME: "cards"


  gatewayserver:
    image: "cisu2/gatewayserver:004"
    container_name: gatewayserver-ms
    ports:
      - "8072:8072"
    depends_on:
      accounts:
        condition: service_healthy # service_completed_successfully
      loans:
        condition: service_healthy # service_completed_successfully
      cards:
        condition: service_healthy # service_completed_successfully
      redis:
        condition: service_healthy
    extends:
      file: common-config.yml # file name
      service: microservice-eureka-config # service to import from the file
    environment:
      SPRING_APPLICATION_NAME: "gatewayserver"
      SPRING_DATA_REDIS_CONNECT-TIMEOUT: 2s
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_TIMEOUT: 1s
      OTEL_SERVICE_NAME: "gatewayserver"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK-SET-URI: "http://keycloak:8080/realms/master/protocol/openid-connect/certs"

# create a network with the name of "cisu2network" and drive of "bridge"
networks:
  cisu2network:
    driver: "bridge"
